# CI — runs the SAME Verify block agents run locally. Keep in sync with AGENT.md.
#
# Two jobs, and the difference matters when you're reading a red X on a PR:
#
#   code-gate            REQUIRED. Must be green to merge. Typecheck, lint,
#                        tests, and a secret scan of THIS PR's commits.
#   secret-history       REPORTING ONLY. Expected to be red today — it reports
#                        the known historical leak (ADR-7 / TD-01). Does not
#                        block. Nothing is wrong when this is red; something is
#                        wrong when code-gate is.
#
# Job `name:` values set the check context shown on the PR and named in branch
# protection. If you change them, the required-status-check name in the ruleset
# must be updated to match, or main gets a required check that never reports and
# every merge blocks. See workflow/SETUP.md §1.
name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  code-gate:
    name: code-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — the secret scan below needs every commit

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Prisma client is generated into node_modules at install time; `npm ci`
      # skips postinstall for some setups, so generate explicitly — tsc --noEmit
      # fails without the generated types.
      - run: npx prisma generate

      # Secret scan — scans THIS BRANCH'S NEW COMMITS against main.
      #
      # Why not gitleaks-action: on a pull_request event it scans only
      # `<head>^..<head>` — the PR's own commits — and silently ignores
      # fetch-depth. That produced a green `verify` on the rollout PR while three
      # live credentials sat in the repo's first commit (ONB-01). A check that
      # cannot fail on a pre-existing leak should not be called a secret scan.
      #
      # This step is the merge gate: it fails if the PR ADDS a secret. The
      # pre-existing leak is covered by the separate `secret-history` job
      # below, which is intentionally not the merge gate — see its comment.
      - name: Install gitleaks
        env:
          # Pin to the version developers run locally (AGENT.md), so CI and
          # local cannot silently diverge on rules or fingerprint behaviour.
          # NOTE: do NOT use `npx gitleaks` — there is no official gitleaks npm
          # package; `npx gitleaks@<ver>` fails with ETARGET, and the `gitleaks`
          # name on npm is an unrelated 1.0.0 stub. Install the real binary.
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Secret scan (new commits)
        env:
          # Pass github context through env, never interpolated into `run:` —
          # a branch name is attacker-controllable on a fork PR, so `${{ }}`
          # directly in the script is a shell-injection vector.
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          BASE="origin/$BASE_REF"
          if git rev-parse --verify -q "$BASE" >/dev/null; then
            RANGE="$BASE..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "Scanning commit range: $RANGE"
          gitleaks detect \
            --source . \
            --log-opts="$RANGE" \
            -c .gitleaks.toml \
            --redact \
            --no-banner \
            -v

      # Optional: static analysis (assessment SK-9)
      # - name: Semgrep
      #   uses: semgrep/semgrep-action@v1

      - name: Verify block (code gate)
        run: npm run verify:code
        # The local command (`npm run verify`) = code gate + a working-tree
        # secret scan. CI splits those: the scan step above covers secrets over a
        # real commit range, so this runs the code-gate variant. Same checks.
        # See rollout/verify-portfolio-tracker.md.

  # Full-history scan — REPORTING ONLY, deliberately not a merge gate.
  #
  # This repo has a known historical leak in commits 2a6c4c1a / 3855042e (.env
  # and .env.local). As of 2026-07-17 NEXTAUTH_SECRET, GEMINI_API_KEY and
  # DATABASE_URL are ROTATED — the values in history are dead. NEWS_API_KEY is
  # still live and public: newsapi.org's free tier offers no revoke, and the
  # owner accepted that risk conditional on this app staying out of production
  # (ADR-7, TECH_DEBT.md TD-01, reviews/2026-07-16-onboarding.md ONB-01).
  #
  # So this job WILL still fail: it reports every historical secret, live or
  # dead, because gitleaks matches shapes and cannot know which values were
  # rotated. Findings for the rotated keys are expected noise; the NEWS_API_KEY
  # findings are the real ones.
  # `continue-on-error` keeps it from blocking unrelated PRs on a known debt,
  # while keeping the finding visible on every run instead of configuring it
  # away. Allowlisting .env is what hid this for months — do not do that again.
  #
  # WHEN ONB-01 IS FULLY RESOLVED (fresh NewsAPI key + history scrubbed, or the
  # repo made private and the dead findings suppressed by fingerprint in a
  # committed, history-scoped ignore file): delete `continue-on-error` and make
  # this a required check. That is the point at which "no secrets in history"
  # becomes a real guarantee rather than an aspiration. Do not silence it before
  # then — a blanket .env allowlist is exactly what hid this leak for months.
  secret-history:
    name: secret-history (reporting only — expected red)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          # Pin to the version developers run locally (AGENT.md), so CI and
          # local cannot silently diverge on rules or fingerprint behaviour.
          # NOTE: do NOT use `npx gitleaks` — there is no official gitleaks npm
          # package; `npx gitleaks@<ver>` fails with ETARGET, and the `gitleaks`
          # name on npm is an unrelated 1.0.0 stub. Install the real binary.
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Secret scan (full history — known to fail, see ADR-7 / TD-01)
        run: |
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            -c .gitleaks.toml \
            --redact \
            --no-banner \
            -v
